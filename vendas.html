<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard de Vendas</title>

  <!-- Qlik CSS -->
  <link rel="stylesheet" href="https://cloudcapacity-nvchile.us.qlikcloud.com/resources/autogenerated/qlik-styles.css"/>

  <!-- Seu CSS -->
  <link rel="stylesheet" href="vendas.css"/>
</head>

<body>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <span>📊 Vendas</span>
  </div>

  <ul class="sidebar-nav">
    <li class="nav-item active" data-page="dashboard">🏠 Dashboard</li>
    <li class="nav-item" data-page="clientes">👥 Clientes</li>
    <li class="nav-item" data-page="produtos">📦 Produtos</li>
  </ul>

  <button id="btnReset">↺ Reset</button>
</nav>

<!-- MAIN -->
<main class="main-content">

<header class="topbar">
  <button id="burgerBtn">☰</button>
  <h1 class="page-title">Dashboard de Vendas</h1>

  <div class="topbar-filters">
    <div id="filter-ano"></div>
    <div id="filter-mes"></div>
    <div id="filter-trimestre"></div>
  </div>
</header>

<div id="page-dashboard" class="page active">

  <!-- KPIs -->
  <div id="obj-kpi-receita"></div>
  <div id="obj-kpi-ticket"></div>
  <div id="obj-kpi-clientes"></div>
  <div id="obj-kpi-vendas"></div>
  <div id="obj-kpi-reccliente"></div>

  <!-- Charts -->
  <div id="obj-barchart"></div>
  <div id="obj-linechart"></div>
  <div id="obj-piechart"></div>
  <div id="obj-combochart"></div>

  <!-- Table -->
  <div id="obj-table"></div>

</div>

</main>

<!-- RequireJS -->

<!-- Config global -->
<script>
window.QlikConfig = {
  host: 'cloudcapacity-nvchile.us.qlikcloud.com',

<!-- Seu JS -->

</html>
