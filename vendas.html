<!-- TOPBAR -->
<header class="topbar">
  <button class="burger" id="burgerBtn">☰</button>
  <h1 class="page-title">Dashboard de Vendas</h1>

  <div class="topbar-filters">
    <div class="filter-chip">
      <span>Período</span>
      <div id="filter-ano" class="qlik-filter"></div>
    </div>
    <div class="filter-chip">
      <span>Mês</span>
      <div id="filter-mes" class="qlik-filter"></div>
    </div>
    <div class="filter-chip">
      <span>Trimestre</span>
      <div id="filter-trimestre" class="qlik-filter"></div>
    </div>
  </div>
</header>

<!-- DASHBOARD -->
<div class="page active" id="page-dashboard">

  <!-- KPIs -->
  <section class="kpi-row">
    <div class="kpi-card"><div id="obj-kpi-receita" class="qlik-obj"></div></div>
    <div class="kpi-card"><div id="obj-kpi-ticket" class="qlik-obj"></div></div>
    <div class="kpi-card"><div id="obj-kpi-clientes" class="qlik-obj"></div></div>
    <div class="kpi-card"><div id="obj-kpi-vendas" class="qlik-obj"></div></div>
    <div class="kpi-card"><div id="obj-kpi-reccliente" class="qlik-obj"></div></div>
  </section>

  <!-- GRÁFICOS -->
  <section class="charts-row">
    <div class="chart-card">
      <div id="obj-barchart" class="qlik-obj"></div>
    </div>
    <div class="chart-card">
      <div id="obj-linechart" class="qlik-obj"></div>
    </div>
  </section>

  <section class="charts-row">
    <div class="chart-card">
      <div id="obj-piechart" class="qlik-obj"></div>
    </div>
    <div class="chart-card">
      <div id="obj-combochart" class="qlik-obj"></div>
    </div>
  </section>

  <!-- TABELA -->
  <section class="table-row">
    <div id="obj-table" class="qlik-obj qlik-obj-tall"></div>
  </section>

</div>
